{% extends 'projects/base_project.html' %}
{% load crispy_forms_tags %}

{% block title %}Delete Automation - {{ block.super }}{% endblock %}

{% block content_project %}
<div class="row">
    <div class="col-md-8 col-md-offset-2">
        <div class="box box-primary">
            <div class="box-body">
                <p>Do you really want to delete the <strong>{{ object }}</strong> automation?</p>
                <form method="post">
                    {% csrf_token %}
                    <a href="{% url 'edit_automation' org_name=request.current_organization.name project_name=project.name automation=object.name %}" class="btn btn-default">Cancel</a>
                    <input type="submit" class="btn btn-danger" value="Confirm">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
